<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stochastic Track: One Note Pitch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 { color: #e94560; font-size: 2.2rem; font-weight: 800; text-align: center; margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { color: #8892b0; font-size: 1.2rem; text-align: center; margin-bottom: 35px; font-weight: 400; }
        .container { max-width: 1100px; margin: 0 auto; }
        .svg-wrapper {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
        }
        svg { width: 100%; height: auto; }
        .footer {
            color: #5a6a8a;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 30px;
            line-height: 1.6;
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }
        .footer strong { color: #8892b0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>STOCHASTIC TRACK</h1>
        <p class="subtitle">What determines the PITCH of ONE NOTE?</p>
        <div class="svg-wrapper">
<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
<defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f0f23"/>
        <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="cardShadow">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#8892b0" opacity="0.5"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#e94560" opacity="0.9"/>
    </marker>
</defs>

<rect width="1000" height="720" fill="url(#bg)" rx="16"/>

<text x="500" y="36" fill="#e94560" font-size="15" font-weight="700" text-anchor="middle">ACTUAL UI CONTROL NAMES</text>
<text x="500" y="54" fill="#8892b0" font-size="10" text-anchor="middle" opacity="0.7">From Stochastic Config + Performance + Scale Tickets pages</text>

<!-- ================================================= -->
<!-- STAGE 1: KEY CONTEXT - from Config Page          -->
<!-- ================================================= -->
<g transform="translate(50, 80)">
    <rect x="0" y="0" width="130" height="155" rx="10" fill="rgba(78,205,196,0.04)" stroke="rgba(78,205,196,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="65" y="24" fill="#4ecdc4" font-size="11" font-weight="700" text-anchor="middle">CONFIG</text>
    <text x="65" y="37" fill="#8892b0" font-size="8" text-anchor="middle" opacity="0.6">Key Context</text>

    <rect x="8" y="47" width="114" height="27" rx="6" fill="rgba(78,205,196,0.14)" stroke="#4ecdc4" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="65" y="66" fill="#99f6e4" font-size="11" font-weight="700" text-anchor="middle">SCALE</text>

    <rect x="8" y="80" width="114" height="27" rx="6" fill="rgba(78,205,196,0.14)" stroke="#4ecdc4" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="65" y="99" fill="#99f6e4" font-size="11" font-weight="700" text-anchor="middle">ROOT NOTE</text>

    <rect x="8" y="113" width="114" height="24" rx="6" fill="rgba(78,205,196,0.10)" stroke="rgba(78,205,196,0.6)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="65" y="130" fill="#99f6e4" font-size="10" font-weight="600" text-anchor="middle">OCTAVE</text>

    <rect x="8" y="128" width="114" height="24" rx="6" fill="rgba(78,205,196,0.10)" stroke="rgba(78,205,196,0.6)" stroke-width="1" filter="url(#cardShadow)" transform="translate(0,14)"/>
    <text x="65" y="159" fill="#99f6e4" font-size="10" font-weight="600" text-anchor="middle">TRANSPOSE</text>
</g>

<!-- Flow arrows -->
<line x1="180" y1="157" x2="200" y2="157" stroke="#8892b0" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>

<!-- ================================================= -->
<!-- STAGE 2: UNIVERSE - from Performance Page        -->
<!-- ================================================= -->
<g transform="translate(220, 80)">
    <rect x="0" y="0" width="120" height="155" rx="10" fill="rgba(59,130,246,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="60" y="24" fill="#3b82f6" font-size="11" font-weight="700" text-anchor="middle">UNIVERSE</text>
    <text x="60" y="37" fill="#8892b0" font-size="8" text-anchor="middle" opacity="0.6">Note Range</text>

    <rect x="8" y="50" width="104" height="38" rx="6" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="60" y="69" fill="#93c5fd" font-size="11" font-weight="700" text-anchor="middle">RANGE</text>
    <text x="60" y="83" fill="#3b82f6" font-size="8" text-anchor="middle" opacity="0.8">1-4 octaves</text>

    <rect x="8" y="95" width="104" height="38" rx="6" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="60" y="114" fill="#93c5fd" font-size="11" font-weight="700" text-anchor="middle">STEPS</text>
    <text x="60" y="128" fill="#3b82f6" font-size="8" text-anchor="middle" opacity="0.8">Steps Sieve</text>
</g>

<line x1="340" y1="157" x2="360" y2="157" stroke="#8892b0" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>

<!-- ================================================= -->
<!-- STAGE 3: TICKETS - from Scale Tickets Page       -->
<!-- ================================================= -->
<g transform="translate(380, 80)">
    <rect x="0" y="0" width="135" height="155" rx="10" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="67" y="24" fill="#a855f7" font-size="11" font-weight="700" text-anchor="middle">TICKETS</text>
    <text x="67" y="37" fill="#8892b0" font-size="8" text-anchor="middle" opacity="0.6">Note Weights</text>

    <rect x="8" y="47" width="119" height="36" rx="6" fill="rgba(168,85,247,0.14)" stroke="#a855f7" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="67" y="65" fill="#e9d5ff" font-size="10" font-weight="700" text-anchor="middle">DEGREE TICKETS</text>
    <text x="67" y="78" fill="#a855f7" font-size="8" text-anchor="middle" opacity="0.8">DEG 1-7, EXCL</text>

    <rect x="8" y="89" width="119" height="28" rx="6" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.6)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="67" y="107" fill="#e9d5ff" font-size="10" font-weight="600" text-anchor="middle">DROT</text>

    <rect x="8" y="122" width="119" height="28" rx="6" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.6)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="67" y="140" fill="#e9d5ff" font-size="10" font-weight="600" text-anchor="middle">MROT</text>
</g>

<line x1="515" y1="157" x2="535" y2="157" stroke="#8892b0" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>

<!-- ================================================= -->
<!-- STAGE 4: SHAPING - from Performance Page         -->
<!-- ================================================= -->
<g transform="translate(555, 80)">
    <rect x="0" y="0" width="160" height="155" rx="10" fill="rgba(59,130,246,0.04)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="80" y="24" fill="#3b82f6" font-size="11" font-weight="700" text-anchor="middle">SHAPING</text>
    <text x="80" y="37" fill="#8892b0" font-size="8" text-anchor="middle" opacity="0.6">Movement</text>

    <g transform="translate(8, 47)">
        <rect x="0" y="0" width="70" height="28" rx="6" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="35" y="18" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">COMPLEX</text>

        <rect x="80" y="0" width="70" height="28" rx="6" fill="rgba(59,130,246,0.14)" stroke="#3b82f6" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="115" y="18" fill="#93c5fd" font-size="10" font-weight="700" text-anchor="middle">CONTOUR</text>
    </g>

    <g transform="translate(8, 82)">
        <rect x="0" y="0" width="70" height="28" rx="6" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="35" y="18" fill="#fcd34d" font-size="10" font-weight="700" text-anchor="middle">BIAS</text>

        <rect x="80" y="0" width="70" height="28" rx="6" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" filter="url(#cardShadow)"/>
        <text x="115" y="18" fill="#fcd34d" font-size="10" font-weight="700" text-anchor="middle">SPREAD</text>
    </g>

    <g transform="translate(8, 117)">
        <rect x="0" y="0" width="144" height="28" rx="6" fill="rgba(16,185,129,0.10)" stroke="rgba(16,185,129,0.6)" stroke-width="1" filter="url(#cardShadow)"/>
        <text x="72" y="18" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">REPEAT</text>
    </g>
</g>

<line x1="715" y1="157" x2="735" y2="157" stroke="#8892b0" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>

<!-- ================================================= -->
<!-- STAGE 5: EVOLUTION - from Performance Page        -->
<!-- ================================================= -->
<g transform="translate(755, 80)">
    <rect x="0" y="0" width="115" height="155" rx="10" fill="rgba(233,69,96,0.04)" stroke="rgba(233,69,96,0.35)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="57" y="24" fill="#e94560" font-size="11" font-weight="700" text-anchor="middle">EVOLUTION</text>
    <text x="57" y="37" fill="#8892b0" font-size="8" text-anchor="middle" opacity="0.6">Randomness</text>

    <rect x="8" y="47" width="99" height="28" rx="6" fill="rgba(233,69,96,0.12)" stroke="#e94560" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="57" y="66" fill="#ff8fa3" font-size="10" font-weight="700" text-anchor="middle">VARIATION</text>

    <rect x="8" y="82" width="99" height="28" rx="6" fill="rgba(168,85,247,0.12)" stroke="#a855f7" stroke-width="1.5" filter="url(#cardShadow)"/>
    <text x="57" y="101" fill="#e9d5ff" font-size="10" font-weight="700" text-anchor="middle">MUTATE</text>

    <rect x="8" y="117" width="99" height="28" rx="6" fill="rgba(168,85,247,0.10)" stroke="rgba(168,85,247,0.6)" stroke-width="1" filter="url(#cardShadow)"/>
    <text x="57" y="136" fill="#e9d5ff" font-size="9" font-weight="600" text-anchor="middle">PATIENCE M</text>
</g>
