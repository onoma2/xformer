<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stochastic Pitch — What Shapes the Note</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #070a15;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #e2e8f0;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            text-align: center;
            font-size: 1.05rem;
            color: #64748b;
            margin-bottom: 50px;
            font-weight: 300;
        }
        
        svg {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
        }
        
        .stage-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            fill: #94a3b8;
        }
        
        .knob-label {
            font-size: 12px;
            font-weight: 600;
            fill: #f1f5f9;
        }
        
        .knob-sublabel {
            font-size: 10px;
            font-weight: 300;
            fill: #64748b;
        }
        
        .connector {
            fill: none;
            stroke: url(#lineGrad);
            stroke-width: 2.5;
            stroke-linecap: round;
            opacity: 0.7;
        }
        
        .connector-glow {
            fill: none;
            stroke: #38bdf8;
            stroke-width: 6;
            stroke-linecap: round;
            opacity: 0.12;
            filter: blur(3px);
        }
        
        .flow-arrow {
            fill: #38bdf8;
            opacity: 0.8;
        }
        
        .dice-dot {
            fill: #fbbf24;
        }
        
        .note-head {
            fill: #fbbf24;
        }
        
        .output-text {
            font-size: 18px;
            font-weight: 700;
            fill: #fbbf24;
            letter-spacing: 1px;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
            font-weight: 400;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stochastic Pitch</h1>
        <p class="subtitle">The journey from a musical idea to the note you actually hear</p>
        
        <svg viewBox="0 0 1100 860" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Glow Filter -->
                <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="4" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <!-- Stage Gradients -->
                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
                    <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.12"/>
                </linearGradient>
                
                <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
                    <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
                </linearGradient>
                
                <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.25"/>
                    <stop offset="100%" style="stop-color:#db2777;stop-opacity:0.12"/>
                </linearGradient>
                
                <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
                    <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.12"/>
                </linearGradient>
                
                <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.25"/>
                    <stop offset="100%" style="stop-color:#059669;stop-opacity:0.12"/>
                </linearGradient>
                
                <linearGradient id="gradOut" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.3"/>
                    <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
                </linearGradient>
                
                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.9"/>
                    <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.9"/>
                </linearGradient>
                
                <!-- Knob Gradient -->
                <radialGradient id="knobGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:#1e293b"/>
                    <stop offset="100%" style="stop-color:#0f172a"/>
                </radialGradient>
                
                <!-- Arrow Marker -->
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8" opacity="0.8"/>
                </marker>
                
                <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24" opacity="0.9"/>
                </marker>
            </defs>
            
            <!-- Background Grid -->
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <circle cx="20" cy="20" r="0.8" fill="#1e293b" opacity="0.5"/>
            </pattern>
            <rect width="1100" height="860" fill="url(#grid)"/>
            
            <!-- ================= STAGE 1: FOUNDATION ================= -->
            <g transform="translate(60, 80)">
                <rect width="200" height="160" rx="16" fill="url(#grad1)" stroke="#0ea5e9" stroke-width="1.5" opacity="0.9"/>
                <text x="100" y="28" text-anchor="middle" class="stage-label" fill="#38bdf8">Foundation</text>
                
                <!-- Knob 1: Scale -->
                <circle cx="55" cy="85" r="28" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <line x1="55" y1="85" x2="70" y2="72" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
                <text x="55" y="132" text-anchor="middle" class="knob-label">Scale / Mode</text>
                <text x="55" y="146" text-anchor="middle" class="knob-sublabel">Major, Minor, Dorian...</text>
                
                <!-- Knob 2: Root -->
                <circle cx="145" cy="85" r="28" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <line x1="145" y1="85" x2="155" y2="68" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
                <text x="145" y="132" text-anchor="middle" class="knob-label">Root Note</text>
                <text x="145" y="146" text-anchor="middle" class="knob-sublabel">C, D#, F, A...</text>
            </g>
            
            <!-- ================= STAGE 2: NOTE POOL ================= -->
            <g transform="translate(320, 80)">
                <rect width="260" height="160" rx="16" fill="url(#grad2)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
                <text x="130" y="28" text-anchor="middle" class="stage-label" fill="#a78bfa">Note Pool</text>
                
                <!-- Knob: Range Low -->
                <circle cx="50" cy="75" r="24" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <line x1="50" y1="75" x2="62" y2="64" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
                <text x="50" y="116" text-anchor="middle" class="knob-label">Lowest Note</text>
                
                <!-- Knob: Range High -->
                <circle cx="130" cy="75" r="24" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <line x1="130" y1="75" x2="142" y2="64" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
                <text x="130" y="116" text-anchor="middle" class="knob-label">Highest Note</text>
                
                <!-- Knob: Muted Degrees -->
                <circle cx="210" cy="75" r="24" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <text x="210" y="70" text-anchor="middle" class="knob-label" style="font-size:14px;fill:#ef4444;font-weight:700;">✕</text>
                <text x="210" y="116" text-anchor="middle" class="knob-label">Muted Degrees</text>
            </g>
            
            <!-- ================= STAGE 3: INTELLIGENCE ================= -->
            <g transform="translate(630, 80)">
                <rect width="240" height="160" rx="16" fill="url(#grad3)" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
                <text x="120" y="28" text-anchor="middle" class="stage-label" fill="#f472b6">Intelligence</text>
                
                <!-- Knob: Voice Leading -->
                <circle cx="70" cy="78" r="26" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <path d="M58,88 Q70,68 82,88" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <text x="70" y="122" text-anchor="middle" class="knob-label">Voice Leading</text>
                <text x="70" y="136" text-anchor="middle" class="knob-sublabel">How close to last note</text>
                
                <!-- Knob: Drift -->
                <circle cx="170" cy="78" r="26" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <line x1="170" y1="78" x2="185" y2="65" stroke="#f472b6" stroke-width="2.5" stroke-linecap="round"/>
                <text x="170" y="122" text-anchor="middle" class="knob-label">Pitch Drift</text>
                <text x="170" y="136" text-anchor="middle" class="knob-sublabel">Upward / Downward bias</text>
            </g>
            
            <!-- ================= STAGE 4: THE ROLL ================= -->
            <g transform="translate(60, 300)">
                <rect width="280" height="160" rx="20" fill="url(#grad4)" stroke="#f59e0b" stroke-width="2" opacity="0.95"/>
                <text x="140" y="32" text-anchor="middle" class="stage-label" fill="#fbbf24">The Roll</text>
                
                <!-- Dice Graphic -->
                <rect x="110" y="55" width="60" height="60" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2" filter="url(#glow)"/>
                <circle cx="125" cy="70" r="5" class="dice-dot"/>
                <circle cx="155" cy="70" r="5" class="dice-dot"/>
                <circle cx="125" cy="100" r="5" class="dice-dot"/>
                <circle cx="155" cy="100" r="5" class="dice-dot"/>
                <circle cx="140" cy="85" r="5" class="dice-dot"/>
                
                <text x="140" y="145" text-anchor="middle" class="knob-label">Weighted Random Choice</text>
                <text x="140" y="159" text-anchor="middle" class="knob-sublabel">From the shaped candidate pool</text>
            </g>
            
            <!-- ================= STAGE 5: OCTAVE CRAFT ================= -->
            <g transform="translate(390, 300)">
                <rect width="320" height="160" rx="16" fill="url(#grad5)" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
                <text x="160" y="28" text-anchor="middle" class="stage-label" fill="#34d399">Octave Craft</text>
                
                <!-- Knob: Base Octave -->
                <circle cx="60" cy="78" r="26" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <text x="60" y="84" text-anchor="middle" class="knob-label" style="font-size:14px;fill:#34d399;">8va</text>
                <text x="60" y="120" text-anchor="middle" class="knob-label">Base Octave</text>
                
                <!-- Knob: Octave Wander -->
                <circle cx="160" cy="78" r="26" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <text x="160" y="84" text-anchor="middle" class="knob-label" style="font-size:16px;fill:#34d399;">⇅</text>
                <text x="160" y="120" text-anchor="middle" class="knob-label">Octave Wander</text>
                <text x="160" y="134" text-anchor="middle" class="knob-sublabel">How far it can jump</text>
                
                <!-- Knob: Octave Shift -->
                <circle cx="260" cy="78" r="26" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <text x="260" y="84" text-anchor="middle" class="knob-label" style="font-size:14px;fill:#34d399;">+1</text>
                <text x="260" y="120" text-anchor="middle" class="knob-label">Octave Shift</text>
            </g>
            
            <!-- ================= STAGE 6: FINAL TOUCH ================= -->
            <g transform="translate(760, 300)">
                <rect width="200" height="160" rx="16" fill="url(#grad1)" stroke="#0ea5e9" stroke-width="1.5" opacity="0.9"/>
                <text x="100" y="28" text-anchor="middle" class="stage-label" fill="#38bdf8">Final Touch</text>
                
                <!-- Knob: Transpose -->
                <circle cx="100" cy="78" r="32" fill="url(#knobGrad)" stroke="#334155" stroke-width="2"/>
                <text x="100" y="86" text-anchor="middle" class="knob-label" style="font-size:18px;fill:#38bdf8;font-weight:700;">±12</text>
                <text x="100" y="128" text-anchor="middle" class="knob-label">Transpose</text>
                <text x="100" y="142" text-anchor="middle" class="knob-sublabel">Semitone nudge</text>
            </g>
            
            <!-- ================= OUTPUT ================= -->
            <g transform="translate(350, 540)">
                <!-- Large glow -->
                <circle cx="200" cy="100" r="110" fill="url(#gradOut)" filter="url(#softGlow)" opacity="0.6"/>
                
                <!-- Main circle -->
                <circle cx="200" cy="100" r="90" fill="#0f172a" stroke="#fbbf24" stroke-width="3" filter="url(#glow)"/>
                <circle cx="200" cy="100" r="84" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
                
                <!-- Note Icon -->
                <g transform="translate(200, 95)">
                    <ellipse cx="-12" cy="8" rx="10" ry="8" class="note-head"/>
                    <line x1="-2" y1="8" x2="-2" y2="-28" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
                    <path d="M-2,-28 Q12,-24 12,-10" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round"/>
                </g>
                
                <text x="200" y="165" text-anchor="middle" class="output-text">THE NOTE YOU HEAR</text>
                <text x="200" y="185" text-anchor="middle" class="knob-sublabel" style="font-size:11px;">Voltage sent to the oscillator</text>
            </g>
            
            <!-- ================= FEEDBACK LOOP ================= -->
            <g transform="translate(60, 520)">
                <rect width="240" height="100" rx="12" fill="url(#grad2)" stroke="#8b5cf6" stroke-width="1.5" opacity="0.8"/>
                <text x="120" y="28" text-anchor="middle" class="stage-label" fill="#a78bfa">Memory</text>
                <text x="120" y="58" text-anchor="middle" class="knob-label">Last Played Note</text>
                <text x="120" y="76" text-anchor="middle" class="knob-sublabel">Feeds back into Voice Leading</text>
                
                <!-- Curved arrow going up to Intelligence -->
                <path d="M120,20 C120,-30 630,-30 750,75" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="6,4" opacity="0.6" marker-end="url(#arrow)"/>
            </g>
            
            <!-- ================= CONNECTIONS ================= -->
            <!-- Foundation to Note Pool -->
            <line x1="260" y1="160" x2="320" y2="160" class="connector-glow"/>
            <line x1="260" y1="160" x2="320" y2="160" class="connector" marker-end="url(#arrow)"/>
            
            <!-- Note Pool to Intelligence -->
            <line x1="580" y1="160" x2="630" y2="160" class="connector-glow"/>
            <line x1="580" y1="160" x2="630" y2="160" class="connector" marker-end="url(#arrow)"/>
            
            <!-- Intelligence to The Roll (curved down) -->
            <path d="M750,240 C750,280 200,280 200,300" fill="none" class="connector-glow"/>
            <path d="M750,240 C750,280 200,280 200,300" fill="none" class="connector" marker-end="url(#arrow)"/>
            
            <!-- The Roll to Octave Craft -->
            <line x1="340" y1="380" x2="390" y2="380" class="connector-glow"/>
            <line x1="340" y1="380" x2="390" y2="380" class="connector" marker-end="url(#arrow)"/>
            
            <!-- Octave Craft to Final Touch -->
            <line x1="710" y1="380" x2="760" y2="380" class="connector-glow"/>
            <line x1="710" y1="380" x2="760" y2="380" class="connector" marker-end="url(#arrow)"/>
            
            <!-- Final Touch to Output -->
            <path d="M860,460 C860,500 550,500 550,540" fill="none" class="connector-glow"/>
            <path d="M860,460 C860,500 550,500 550,540" fill="none" class="connector" marker-end="url(#arrowGold)"/>
            
            <!-- Output to Memory (feedback) -->
            <path d="M350,610 C250,650 180,650 180,620" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.4" stroke-dasharray="5,5" marker-end="url(#arrowGold)"/>
            
            <!-- ================= PARAMETER LABELS / DETAIL ================= -->
            <g transform="translate(60, 680)">
                <rect width="980" height="140" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
                
                <text x="490" y="30" text-anchor="middle" class="stage-label" style="font-size:12px;fill:#475569;">Parameter Quick Reference</text>
                
                <!-- Column 1 -->
                <text x="30" y="58" class="knob-label" style="font-size:11px;fill:#38bdf8;">Foundation</text>
                <text x="30" y="76" class="knob-sublabel">Scale sets the note collection. Root sets the tonal center.</text>
                
                <!-- Column 2 -->
                <text x="30" y="98" class="knob-label" style="font-size:11px;fill:#a78bfa;">Note Pool</text>
                <text x="30" y="116" class="knob-sublabel">Range + mutes create the allowed candidate notes.</text>
                
                <!-- Column 3 -->
                <text x="360" y="58" class="knob-label" style="font-size:11px;fill:#f472b6;">Intelligence</text>
                <text x="360" y="76" class="knob-sublabel">Voice leading keeps steps smooth. Drift biases direction.</text>
                
                <!-- Column 4 -->
                <text x="360" y="98" class="knob-label" style="font-size:11px;fill:#fbbf24;">The Roll</text>
                <text x="360" y="116" class="knob-sublabel">Chance picks one note from the weighted pool.</text>
                
                <!-- Column 5 -->
                <text x="690" y="58" class="knob-label" style="font-size:11px;fill:#34d399;">Octave Craft</text>
                <text x="690" y="76" class="knob-sublabel">Base, wander, and shift place the note in the right register.</text>
                
                <!-- Column 6 -->
                <text x="690" y="98" class="knob-label" style="font-size:11px;fill:#38bdf8;">Final Touch</text>
                <text x="690" y="116" class="knob-sublabel">Transpose offsets everything by semitones.</text>
            </g>
        </svg>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background:#0ea5e9;"></div>
                <span>Musical Context</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#8b5cf6;"></div>
                <span>Filtering</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#ec4899;"></div>
                <span>Shaping</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#f59e0b;"></div>
                <span>Random Selection</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background:#10b981;"></div>
                <span>Register</span>
            </div>
        </div>
    </div>
</body>
</html>
