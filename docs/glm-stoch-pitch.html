    <stop offset="0%" stop-color="#0f2520"/><stop offset="100%" stop-color="#14403a"/>
  </linearGradient>
  <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#252010"/><stop offset="100%" stop-color="#403518"/>
  </linearGradient>
  <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#301520"/><stop offset="100%" stop-color="#502038"/>
  </linearGradient>
  <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">

<g transform="translate(0,130)">

    <text x="0" y="54" text-anchor="middle" fill="#777" font-size="10">C · C♯ · D · D♯ · E…</text>

  <!-- Explanation -->

<!-- SECTION 2: BUILD THE NOTE POOL                                     -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<g transform="translate(0,420)">
  <circle cx="550" cy="28" r="20" fill="#4ea8de" filter="url(#glow)"/>
  <text x="550" y="34" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">2</text>

  <text x="110" y="92" fill="#7dd3fc" font-size="20" font-weight="600">BUILD THE NOTE POOL</text>
  <text x="110" y="112" fill="#5a88aa" font-size="12" font-style="italic">Pitch page + Scale Tickets — which notes can even be picked?</text>

  <!-- Row of knobs -->
  <!-- Range -->
  <g transform="translate(140,178)">
    <use href="#k" width="48" height="48" x="-24" y="-24"/>
    <text x="0" y="36" text-anchor="middle" fill="#ddd" font-size="13" font-weight="600">Range</text>

  <!-- Scale Tickets -->
  <g transform="translate(350,178)">
    <use href="#k" width="48" height="48" x="-24" y="-24"/>

    <text x="0" y="51" text-anchor="middle" fill="#777" font-size="10">Per-degree weight or EXCL</text>
  </g>

  <!-- Steps -->
  <g transform="translate(560,178)">
    <use href="#k" width="48" height="48" x="-24" y="-24"/>
    <text x="0" y="36" text-anchor="middle" fill="#ddd" font-size="13" font-weight="600">Steps</text>
    <text x="0" y="51" text-anchor="middle" fill="#777" font-size="10">How many notes survive</text>
  </g>

  <!-- DROT -->
  <g transform="translate(770,178)">
    <use href="#ks" width="40" height="40" x="-20" y="-20"/>
    <text x="0" y="32" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">DROT</text>
    <text x="0" y="46" text-anchor="middle" fill="#777" font-size="10">Rotate ticket slots</text>
  </g>

  <!-- MROT -->

    <use href="#ks" width="40" height="40" x="-20" y="-20"/>
    <text x="0" y="32" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">MROT</text>
    <text x="0" y="46" text-anchor="middle" fill="#777" font-size="10">Rotate emphasis</text>
  </g>

  <!-- Visual: Pool building -->
  <g transform="translate(90,250)">
    <rect x="0" y="0" width="920" height="170" rx="10" fill="#08081a" opacity="0.5"/>

    <!-- Row 1: Scale gives notes -->
    <text x="20" y="25" fill="#7dd3fc" font-size="13" font-weight="600">Scale gives the note names:</text>
    <g transform="translate(230,12)">
      <rect x="0" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="15" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">C</text>
      <rect x="36" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="51" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">D</text>
      <rect x="72" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="87" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">E</text>
      <rect x="108" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="123" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">F</text>
      <rect x="144" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="159" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">G</text>
      <rect x="180" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="195" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">A</text>
      <rect x="216" y="0" width="30" height="22" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="231" y="16" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="600">B</text>
    </g>

    <!-- Row 2: Range expands across octaves -->
    <text x="20" y="62" fill="#7dd3fc" font-size="13" font-weight="600">Range stacks octaves:</text>
    <g transform="translate(230,48)">
      <rect x="0" y="0" width="276" height="22" rx="4" fill="#0d1a30" stroke="#3a5a80" stroke-width="0.6"/>
      <text x="138" y="15" text-anchor="middle" fill="#5a8ab0" font-size="10">C D E F G A B</text>
      <rect x="280" y="0" width="276" height="22" rx="4" fill="#0d1a30" stroke="#3a5a80" stroke-width="0.6"/>
      <text x="418" y="15" text-anchor="middle" fill="#5a8ab0" font-size="10">C D E F G A B</text>
      <text x="138" y="-4" text-anchor="middle" fill="#445" font-size="9">oct 1</text>
      <text x="418" y="-4" text-anchor="middle" fill="#445" font-size="9">oct 2</text>

    <!-- Row 3: Tickets exclude / boost -->
    <text x="20" y="98" fill="#7dd3fc" font-size="13" font-weight="600">Scale Tickets boost or ban:</text>
    <g transform="translate(230,85)">
      <rect x="0" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="15" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10">C</text>
      <rect x="36" y="0" width="30" height="22" rx="4" fill="#401a1a" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
      <text x="51" y="15" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">✕</text>
      <rect x="72" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="87" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10">E</text>
      <rect x="108" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="123" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10">F</text>
      <rect x="144" y="0" width="30" height="22" rx="4" fill="#401a1a" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
      <text x="159" y="15" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">✕</text>
      <rect x="180" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="195" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10">A</text>
      <rect x="216" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="231" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10">B</text>
    </g>

    <!-- Row 4: Steps sieve -->
    <text x="20" y="135" fill="#7dd3fc" font-size="13" font-weight="600">Steps keeps only the strongest:</text>
    <g transform="translate(230,122)">
      <rect x="0" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="15" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">C</text>
      <rect x="72" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="87" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">E</text>
      <rect x="108" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="123" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">F</text>
      <rect x="180" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="195" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">A</text>
      <rect x="216" y="0" width="30" height="22" rx="4" fill="#1a4030" stroke="#4ecdc4" stroke-width="0.8"/>
      <text x="231" y="15" text-anchor="middle" fill="#4ecdc4" font-size="10" font-weight="600">B</text>
      <text x="280" y="15" fill="#555" font-size="11">← the pool is ready</text>
    </g>

    <text x="16" y="160" fill="#555" font-size="11" font-style="italic">DROT / MROT shift which notes carry the emphasis — same scale, different flavor.</text>
  </g>
</g>

</g>

<!-- SECTION 3: SHAPE THE PROBABILITIES                                 -->
<!-- ══════════════════════════════════════════════════════════════════ -->
<g transform="translate(0,910)">
  <circle cx="550" cy="28" r="20" fill="#4ecdc4" filter="url(#glow)"/>
  <text x="550" y="34" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">3</text>

  <rect x="50" y="55" width="1000" height="520" rx="16" fill="url(#g3)" opacity="0.55" filter="url(#sh)"/>
  <rect x="50" y="55" width="1000" height="520" rx="16" fill="none" stroke="#4ecdc4" stroke-width="1" opacity="0.25"/>

  <text x="110" y="92" fill="#86efac" font-size="20" font-weight="600">SHAPE THE PROBABILITIES</text>
  <text x="110" y="112" fill="#5a9977" font-size="12" font-style="italic">Three forces pull on the pool — they multiply together</text>

  <!-- Force A: Complexity -->
  <g transform="translate(90,140)">
    <rect x="0" y="0" width="290" height="200" rx="12" fill="#08081a" opacity="0.5"/>
    <text x="145" y="24" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" letter-spacing="1">HOW FAR?</text>

    <g transform="translate(145,62)">
      <use href="#k" width="48" height="48" x="-24" y="-24"/>
    </g>
    <text x="145" y="98" text-anchor="middle" fill="#ddd" font-size="14" font-weight="600">Complexity</text>
    <text x="145" y="115" text-anchor="middle" fill="#777" font-size="10">Live page · step encoder 8</text>

    <!-- Mini graph: triangular hill -->
    <g transform="translate(30,130)">
      <line x1="0" y1="50" x2="230" y2="50" stroke="#333" stroke-width="0.5"/>
      <!-- Low complexity: narrow hill -->
      <polyline points="80,50 95,10 110,50" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
      <text x="95" y="62" text-anchor="middle" fill="#555" font-size="9">last note</text>
      <text x="40" y="30" fill="#555" font-size="9">Low</text>
      <text x="40" y="42" fill="#555" font-size="9">= steps</text>

      <!-- High complexity: wide hill -->
      <polyline points="30,50 95,20 160,50" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
      <text x="190" y="30" fill="#555" font-size="9">High</text>
      <text x="190" y="42" fill="#555" font-size="9">= leaps</text>
    </g>
  </g>

  <!-- Force B: Contour -->
  <g transform="translate(405,140)">
    <rect x="0" y="0" width="290" height="200" rx="12" fill="#08081a" opacity="0.5"/>
    <text x="145" y="24" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" letter-spacing="1">WHICH WAY?</text>

    <g transform="translate(145,62)">
      <use href="#k" width="48" height="48" x="-24" y="-24"/>
    </g>
    <text x="145" y="98" text-anchor="middle" fill="#ddd" font-size="14" font-weight="600">Contour</text>
    <text x="145" y="115" text-anchor="middle" fill="#777" font-size="10">Live page · step encoder 9</text>

    <!-- Mini graph: direction bias -->
    <g transform="translate(30,130)">
      <line x1="0" y1="50" x2="230" y2="50" stroke="#333" stroke-width="0.5"/>
      <!-- Upward bias -->
      <polyline points="60,50 80,35 120,15 160,8 200,5" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
      <text x="60" y="62" fill="#555" font-size="9">last</text>
      <text x="20" y="30" fill="#fbbf24" font-size="9">+ = climb</text>
      <!-- Downward bias -->
      <polyline points="30,5 70,8 110,15 150,35 170,50" fill="none" stroke="#7c6aef" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
      <text x="175" y="30" fill="#7c6aef" font-size="9">− = fall</text>
    </g>
  </g>

  <!-- Force C: Bias / Spread (Marbles) -->
  <g transform="translate(720,140)">
    <rect x="0" y="0" width="290" height="200" rx="12" fill="#08081a" opacity="0.5"/>
    <text x="145" y="24" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600" letter-spacing="1">WHERE TO LAND?</text>

    <g transform="translate(80,62)">
      <use href="#k" width="42" height="42" x="-21" y="-21"/>
    </g>
    <text x="80" y="92" text-anchor="middle" fill="#ddd" font-size="13" font-weight="600">Bias</text>

    <g transform="translate(210,62)">
      <use href="#k" width="42" height="42" x="-21" y="-21"/>
    </g>
    <text x="210" y="92" text-anchor="middle" fill="#ddd" font-size="13" font-weight="600">Spread</text>

    <text x="145" y="112" text-anchor="middle" fill="#777" font-size="10">Live page · step 10 &amp; 11</text>

    <!-- Mini graph: bell curve -->
    <g transform="translate(30,125)">
      <line x1="0" y1="55" x2="230" y2="55" stroke="#333" stroke-width="0.5"/>
      <text x="20" y="50" fill="#555" font-size="8">low</text>
      <text x="200" y="50" fill="#555" font-size="8">high</text>
      <!-- Narrow bell -->
      <path d="M70,55 Q90,5 110,55" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
      <!-- Wide bell -->
      <path d="M20,55 Q110,15 200,55" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
      <text x="115" y="68" text-anchor="middle" fill="#555" font-size="9">← Bias moves the peak →</text>
    </g>
  </g>

  <!-- Summary formula -->
  <g transform="translate(90,360)">
    <rect x="0" y="0" width="920" height="55" rx="10" fill="#0a1a15" stroke="#4ecdc4" stroke-width="0.8" opacity="0.3"/>
