</head>

<!-- ═══ TITLE ═══ -->

<text x="550" y="80" text-anchor="middle" fill="#6a6a90" font-size="14" letter-spacing="4" font-weight="300">PICKING 4 NOTES IN C MAJOR — STEP BY STEP</text>

<line x1="550" y1="116" x2="550" y2="6250" stroke="url(#spine)" stroke-width="2" opacity="0.1" stroke-dasharray="6,6"/>


<!-- ═══ SETUP ═══ -->
<g transform="translate(0,116)">

  <text x="130" y="78" fill="#7dd3fc" font-size="15" font-weight="600">Range:</text>

  <text x="130" y="101" fill="#86efac" font-size="15" font-weight="600">Goal:</text>

  <text x="130" y="122" fill="#fca5a5" font-size="11" font-style="italic">Low Degree / High Degree knobs exist in the UI but do NOT affect pitch generation.</text>
</g>

</g>

<!-- ═══ STEP 2: SCALE TICKETS GATE ═══ -->
<g transform="translate(0,546)">
  <circle cx="550" cy="24" r="18" fill="#4ea8de" filter="url(#glow)"/>
  <text x="550" y="30" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <rect x="60" y="50" width="980" height="230" rx="14" fill="url(#gB)" opacity="0.5" filter="url(#sh)"/>

  <text x="370" y="82" fill="#777" font-size="13">— exclude degrees, apply weights</text>

  <g transform="translate(120,170)">

      <rect x="174" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>

      <rect x="348" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="374" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">B3</text>
      <rect x="420" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="446" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">C4</text>
      <rect x="478" y="0" width="52" height="26" rx="4" fill="#401515" stroke="#ef4444" stroke-width="0.8" opacity="0.7"/>

      <rect x="536" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="562" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">E4</text>
      <rect x="594" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="620" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">F4</text>
      <rect x="652" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="678" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">G4</text>
      <rect x="710" y="0" width="52" height="26" rx="4" fill="#401515" stroke="#ef4444" stroke-width="0.8" opacity="0.7"/>
      <text x="736" y="18" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="700">✕A4</text>
      <rect x="768" y="0" width="52" height="26" rx="4" fill="#1a2a55" stroke="#5a4aaf" stroke-width="0.7"/>
      <text x="794" y="18" text-anchor="middle" fill="#a8a0df" font-size="10">B4</text>
    </g>
    <text x="860" y="42" fill="#4ea8de" font-size="12" font-weight="600">10 survive</text>
  </g>

  <g transform="translate(120,228)">
    <use href="#ks" width="30" height="30" x="-15" y="-10"/>
    <text x="22" y="0" fill="#777" font-size="11">DROT rotates which ticket maps to which degree. MROT cycles ticket values among included degrees.</text>
  </g>
</g>

<g opacity="0.5"><line x1="550" y1="800" x2="550" y2="825" stroke="#4ea8de" stroke-width="2"/>
  <polygon points="544,822 550,833 556,822" fill="#4ea8de"/></g>


<!-- ═══ STEP 3: STEPS SIEVE ═══ -->
<g transform="translate(0,836)">
  <circle cx="550" cy="24" r="18" fill="#4ea8de" filter="url(#glow)"/>
  <text x="550" y="30" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <rect x="60" y="50" width="980" height="250" rx="14" fill="url(#gB)" opacity="0.5" filter="url(#sh)"/>
  <rect x="60" y="50" width="980" height="250" rx="14" fill="none" stroke="#4ea8de" stroke-width="0.8" opacity="0.25"/>

  <text x="120" y="82" fill="#7dd3fc" font-size="18" font-weight="600">STEPS SIEVE</text>
  <text x="280" y="82" fill="#777" font-size="13">— rank by harmonic strength, keep top K</text>

  <g transform="translate(160,118)">

  <text x="120" y="145" fill="#7dd3fc" font-size="12" font-weight="600">Harmonic ranking (C Major):</text>
  <g transform="translate(120,155)">
    <rect x="0" y="0" width="860" height="22" rx="3" fill="#0a0a1a" opacity="0.6"/>
    <text x="30" y="15" text-anchor="middle" fill="#7dd3fc" font-size="11" font-weight="700">C</text>

    <text x="470" y="15" fill="#555" font-size="11">→ applied per octave</text>

  <g transform="translate(120,180)">

    <text x="210" y="12" text-anchor="middle" fill="#aaa" font-size="10">rank 20</text>
    <text x="270" y="12" text-anchor="middle" fill="#aaa" font-size="10">rank 10</text>
    <text x="330" y="12" text-anchor="middle" fill="#444" font-size="10">rank 5</text>
    <text x="390" y="12" text-anchor="middle" fill="#444" font-size="10">rank 0</text>
    <text x="470" y="12" fill="#7dd3fc" font-size="11" font-weight="600">Root strongest, B weakest</text>
  </g>

  <g transform="translate(120,205)">
    <text x="0" y="14" fill="#7dd3fc" font-size="12" font-weight="600">Steps = 60 → K = ceil(10 × 60/100) = 6 survivors:</text>
    <g transform="translate(0,24)">
      <rect x="0" y="0" width="52" height="24" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="26" y="16" text-anchor="middle" fill="#7dd3fc" font-size="10">C3</text>

      <rect x="174" y="0" width="52" height="24" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>
      <text x="200" y="16" text-anchor="middle" fill="#7dd3fc" font-size="10">G3</text>
      <rect x="232" y="0" width="52" height="24" rx="4" fill="#1a3060" stroke="#4ea8de" stroke-width="0.8"/>

  <text x="120" y="278" fill="#555" font-size="11" font-style="italic">This pool is reused for all 4 notes. Only the dice change per note.</text>

<!-- ═══ STEP 4: SHAPE THE WEIGHTS — the formula ═══ -->
<g transform="translate(0,1150)">
  <circle cx="550" cy="24" r="18" fill="#4ecdc4" filter="url(#glow)"/>
  <text x="550" y="30" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <rect x="40" y="50" width="1020" height="230" rx="14" fill="url(#gC)" opacity="0.5" filter="url(#sh)"/>

  <text x="100" y="82" fill="#86efac" font-size="18" font-weight="600">SHAPE THE WEIGHTS</text>
  <text x="340" y="82" fill="#777" font-size="13">— three forces multiply to set each note's chance</text>

  <!-- The formula -->
  <g transform="translate(80,100)">
