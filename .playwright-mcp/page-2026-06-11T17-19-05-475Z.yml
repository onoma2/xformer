  - paragraph [ref=e4]: "Two axes interacting. The temporal curve decides when pulses fire (tinted columns). CV mode decides how pitch is read: Free = pitch follows its curve continuously; Gate = pitch is sampled & held at each pulse. In Gate, temporal warp slides the pulses along the pitch curve, so the same pulses play different notes — in Free it only re-articulates. 4 measures of 4/4, 16th-note columns; gray = fixed C-minor reference melody."
