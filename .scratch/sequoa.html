<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Sequoa</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f1f3f5;color:#333;font-family:-apple-system,system-ui,"Segoe UI",sans-serif;font-size:13px;letter-spacing:.2px;user-select:none}
  .app{max-width:1400px;margin:0 auto;padding:12px}
  #clockwrap{height:14px;margin-bottom:9px}
  .top{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin-bottom:10px;position:sticky;top:8px;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .logo{font-weight:800;letter-spacing:-.3px;font-size:16px}

  .top .grp{display:flex;align-items:center;gap:6px}

  select.v{border:1px solid #d6dde6;border-radius:4px;padding:1px 4px;background:#fff;cursor:pointer}
  .play{margin-left:auto;background:#16a34a;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-weight:700;font-size:12px;letter-spacing:.5px;cursor:pointer}
  .play.on{background:#dc2626}
  .track{display:flex;flex-direction:column;background:#fff;border:1px solid #e0e0e0;border-left:4px solid #888;border-radius:8px;margin-bottom:9px;overflow:hidden}
  .thead{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f0f0f0}
  .idx{width:18px;height:18px;border-radius:4px;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .nm{font-weight:700;font-size:13px;letter-spacing:-.2px}
  select.reload{font-weight:700;font-size:13px;letter-spacing:-.2px;color:#333;border:1px solid #e0e0e0;border-radius:5px;padding:1px 4px;background:#fafbfc;cursor:pointer}
  .tag{color:#aaa;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .solo{margin-left:auto;font-size:12px;font-weight:700;letter-spacing:.5px;color:#a16207;background:#fef9e7;border:1px solid #f3e2a0;border-radius:9px;padding:1px 8px;cursor:pointer}
  .solo.act{color:#fff;background:#eab308;border-color:#ca8a04}
  .on{font-size:12px;font-weight:700;letter-spacing:.5px;color:#16a34a;background:#eafaf0;border:1px solid #b8ebcb;border-radius:9px;padding:1px 8px;cursor:pointer}
  .on.off{color:#aaa;background:#f3f4f6;border-color:#e5e7eb}
  .track.off .tbody{opacity:.4}
  .tbody{display:flex;align-items:stretch}
  .eparams{width:172px;flex-shrink:0;padding:9px 11px;border-right:1px solid #eee;display:flex;flex-direction:column;gap:7px;justify-content:center}
  .elab{color:#b6bec7;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:1px}
  .cr{display:flex;align-items:center;height:16px}
  .cl{color:#999;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;min-width:80px}
  .cv{color:#333;font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:600}
  .vizwrap{width:632px;flex-shrink:0;display:flex;align-items:center}
  canvas{display:block}
  .seg{display:flex;flex-direction:column;gap:2px}
  .eparams input[type=range]{width:130px;margin:2px 0;accent-color:#2563eb}
  .viz{cursor:crosshair}
  .scrub{cursor:ns-resize}
  .cv.scrub{border-bottom:1px dotted #c7ced6}
  .v.scrub{border-bottom:1px dotted #9bb3e0}
  .cv.dim{color:#cbd5e1}
  .fchip.scrub:hover,.cv.scrub:hover,.v.scrub:hover{background:#f0f4f9}
  /* accumulator pane */
  .accwrap{width:262px;flex-shrink:0;border-left:1px solid #eee;padding:9px 12px;display:flex;flex-direction:column;gap:7px;background:#fcfcfd}
  .acchead{display:flex;align-items:baseline;justify-content:space-between}
  .accoff{font-family:ui-monospace,Menlo,monospace;font-weight:700;font-size:13px}
  .accgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;margin-top:1px}
  .accgrid .cl{min-width:0}
  .accgrid .cr{justify-content:space-between}
  .accgrid .cv{cursor:pointer}
  /* math glyph */
  .mathwrap{width:150px;flex-shrink:0;border-left:1px solid #eee;background:#fafbfc;display:flex;align-items:center}
  /* voice-mod pane (note value -> cutoff/amp) */
  .vmodwrap{width:120px;flex-shrink:0;border-left:1px solid #eee;background:#fcfcfd;padding:9px 11px;display:flex;flex-direction:column;gap:7px;justify-content:center}
  .vmodwrap .cl{min-width:0}
  .vmodwrap .cr{justify-content:space-between}
  /* footer */
  .tfoot{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:7px 12px;border-top:1px solid #f0f0f0;background:#fbfcfd}
  .fchip{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #e7eaee;border-radius:5px;padding:2px 7px}
  .fchip.act{cursor:pointer}
  .fk{color:#9aa3ad;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .fv{color:#333;font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:600}
  .fsep{width:1px;height:15px;background:#e0e4e9;margin:0 3px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">SEQU<span>OA</span></div>
    <div class="grp"><span class="lab">BPM</span><span class="v" id="bpm">120</span></div>
    <div class="grp"><span class="lab">Clock</span><span class="v">INT</span></div>
    <div class="grp"><span class="lab">Scale</span><select class="v" id="masterScale"></select></div>
    <div class="grp"><span class="lab">Cycle</span><span class="v" id="cycle">—</span></div>
    <button class="play" id="play">▶ PLAY</button>
  </div>
  <div id="clockwrap"><canvas id="clockviz"></canvas></div>
  <div id="tracks"></div>
</div>

<script>
"use strict";

/* ============================================================
   Partition-crosser core (k axes; k=1 in use). Cursor in [0,1)^k.
   Per-axis ascending thresholds in (0,1) partition [0,1) into
   stages. Cell = tuple of stage indices. Moving the cursor past a
   threshold is a crossing; passing 1 wraps. Selection is one
   comparator: stageOf(). Uniform OR free placement is just a
   different threshold list — the engine difference lives here.
   ============================================================ */
function Crosser(axes) {
  this.axes = axes.map(a => ({ thr: a.thresholds, phase: 0, stage: 0 }));
}
Crosser.prototype.stageOf = function (ax, phase) {
  let s = 0, t = ax.thr;
  while (s < t.length && phase >= t[s]) s++;          // the one invariant comparator
  return s;
};
Crosser.prototype.setPhase = function (i, phase) {
  const ax = this.axes[i];
  const wrapped = phase - Math.floor(phase);
  const prev = ax.stage;
  const didWrap = Math.floor(phase) !== Math.floor(ax.phase) || phase < ax.phase;
  ax.phase = wrapped;
  ax.stage = this.stageOf(ax, wrapped);
  return { stage: ax.stage, crossed: ax.stage !== prev || didWrap, wrapped: didWrap };
};
Crosser.prototype.cell = function () { return this.axes.map(a => a.stage); };

/* ============================================================
   Scale tables (cents within a repeat interval) + degree-indexed
   readout. Tables from finished/o2f; here the sequencer holds a
   discrete scale-degree, so we index the degree directly.
   ============================================================ */
const _edo = n => Array.from({ length: n }, (_, k) => 1200 * k / n);
const SCALES = [
  null,                                                     // 0 Off
  { rep: 1200, deg: _edo(12) },                             // 1 Chromatic 12-TET
  { rep: 1200, deg: [0, 200, 400, 500, 700, 900, 1100] },   // 2 Major
  { rep: 1200, deg: [0, 200, 300, 500, 700, 800, 1000] },   // 3 Natural minor
  { rep: 1200, deg: [0, 200, 300, 500, 700, 800, 1100] },   // 4 Harmonic minor
  { rep: 1200, deg: [0, 200, 400, 700, 900] },              // 5 Major pentatonic
  { rep: 1200, deg: [0, 200, 400, 600, 800, 1000] },        // 6 Whole-tone
  { rep: 1200, deg: [0, 203.91, 386.31, 498.04, 701.96, 884.36, 1088.27] }, // 7 Just intonation
  { rep: 1200, deg: _edo(24) },                             // 8 24-TET
  { rep: 1200, deg: _edo(19) },                             // 9 19-TET
  { rep: 1200, deg: _edo(31) },                             // 10 31-TET
  { rep: 1901.955, deg: Array.from({ length: 13 }, (_, k) => 1901.955 * k / 13) }, // 11 Bohlen–Pierce
];
const SCALE_NAMES = ['Off','Chromatic 12-TET','Major','Natural minor','Harmonic minor',
  'Major pentatonic','Whole-tone','Just intonation','24-TET','19-TET','31-TET','Bohlen–Pierce'];
const TONIC_HZ = 65.40639; // C2
const DEG_MAX = 12;        // editable degree range (y-axis of the step lane)
function degToFreq(deg, scale) {
  if (!scale) return TONIC_HZ * Math.pow(2, deg / 12);      // Off -> semitones
  const L = scale.deg.length;
  const oct = Math.floor(deg / L), idx = deg - oct * L;
  const cents = oct * scale.rep + scale.deg[idx];
  return TONIC_HZ * Math.pow(2, cents / 1200);
}
// One master scale, set at the top and inherited by every track (spec §3).
// A track adds only its own scale-degree transpose within that scale.
let masterScaleIdx = 2; // Major
function readout(track, stage) {
  const deg = track.values[stage] + track.transpose + (track.accVal || 0);
  return { freq: degToFreq(deg, SCALES[masterScaleIdx]), deg: deg };
}
// Nearest 12-TET note name for a frequency (display only; non-12-TET scales approximate).
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
function noteName(freq) {
  const midi = Math.round(69 + 12 * Math.log2(freq / 440));
  return NOTE_NAMES[((midi % 12) + 12) % 12] + (Math.floor(midi / 12) - 1);
}
// Accumulator value projected at stage i, for the cycle's forward play order from the window start.
function projectedAcc(tr, i) {
  const [lo, hi] = activeWindow(tr);
  if (!tr.acc.step || i < lo || i > hi) return 0;
  let acc = 0, dir = 1; const lim = tr.acc.limit, ord = tr.acc.order || 'wrap';   // stage-level projection (pulse-advance climbs faster than shown)
  for (let t = 1; t <= i - lo; t++) if (t % tr.acc.every === 0) { acc += tr.acc.step * dir; if (lim && Math.abs(acc) >= lim) { if (ord === 'pendulum') { acc = Math.sign(acc) * lim; dir = -dir; } else acc = 0; } }
  return acc;
}
// "C1" set pitch, plus "(B1)" effective pitch when the accumulator shifts this stage.
function stageNote(tr, i) {
  const sc = SCALES[masterScaleIdx], setDeg = tr.values[i] + tr.transpose;
  let s = noteName(degToFreq(setDeg, sc));
  if (tr.acc.step) { const eff = setDeg + projectedAcc(tr, i); if (eff !== setDeg) s += '(' + noteName(degToFreq(eff, sc)) + ')'; }
  return s;
}

/* ============================================================
   Track placement: weights = per-stage time share. Thresholds are
   the cumulative weight fractions; Even Grid (all weights 1) gives
   uniform i/n, Weighted Hold gives the free partition.
   ============================================================ */
// Recompute thresholds/crosser from weights only — no runtime reset (used on live edits).
function rebuildPlacement(tr) {
  const W = tr.weights.reduce((a, b) => a + b, 0);
  let cum = 0; const thr = [], start = [];
  for (let i = 0; i < tr.weights.length; i++) {
    start.push(cum / W);
    cum += tr.weights[i];
    if (i < tr.weights.length - 1) thr.push(cum / W);
  }
  tr.cumStart = start;
  tr.crosser = new Crosser([{ thresholds: thr }]);
}
// Absolute mode: per-stage threshold positions tr.pos[]; play order = stages sorted by
// position (independent + reorderable). seq[rank]=stage, gap[rank]=dwell fraction (wraps).
function rebuildAbs(tr) {
  const n = tr.steps;
  tr.seq = tr.pos.map((_, i) => i).sort((a, b) => tr.pos[a] - tr.pos[b]);
  const sp = tr.seq.map(i => tr.pos[i]);
  tr.sortedPos = sp;
  tr.gap = sp.map((p, r) => r < n - 1 ? sp[r + 1] - p : (1 - p) + sp[0]);
}
// Grow/shrink the stage arrays and rebuild placement (live, no runtime reset).
function setStageCount(tr, n) {
  n = Math.min(32, Math.max(1, n)); const cur = tr.steps;
  if (n > cur) for (let i = cur; i < n; i++) { tr.weights.push(1); tr.values.push(tr.values.length ? tr.values[tr.values.length - 1] : 0); tr.gates.push(true); tr.dirs.push('both'); }
  else if (n < cur) { tr.weights.length = n; tr.values.length = n; tr.gates.length = n; tr.dirs.length = n; }
  tr.steps = n;
  tr.last = Math.min(tr.last, n - 1); tr.first = Math.min(tr.first, tr.last);
  rebuildPlacement(tr);
  if (tr.widthMode === 'abs') { tr.pos = tr.cumStart.slice(); rebuildAbs(tr); }
}
// One k=2 axis: own length, placement (cumulative-fraction thresholds), order, rate, mover.
function buildAxis(def) {
  const steps = def.steps, weights = def.weights || Array(steps).fill(1);
  const W = weights.reduce((a, b) => a + b, 0); let cum = 0; const cumStart = [];
  for (let i = 0; i < steps; i++) { cumStart.push(cum / W); cum += weights[i]; }
  const base = def.rateMul == null ? 1 : def.rateMul;
  return { steps, weights, cumStart, order: def.order || 'fwd', baseRate: base, rateMul: base,
    mover: def.mover || 'stepped', widthMode: 'len', first: 0, last: steps - 1, idx: 0, dir: 1, nextTime: 0, stage: 0 };
}
// Resize one k=2 axis (2..8); preserve existing cell pitches + mutes, re-fit the canvas (height tracks rows).
function setGridDim(tr, ai, n) {
  n = Math.max(2, Math.min(8, n));
  tr.axisDefs[ai].steps = n;
  const old = tr.axes[ai];
  tr.axes[ai] = buildAxis(tr.axisDefs[ai]);
  tr.axes[ai].rateMul = old.rateMul; tr.axes[ai].order = old.order;
  tr.axes[ai].nextTime = old.nextTime; tr.axes[ai].dir = old.dir;   // keep scheduling position (no catch-up burst)
  tr.axes[ai].idx = Math.min(old.idx, n - 1); tr.axes[ai].stage = Math.min(old.stage, n - 1);
  const nx = tr.axes[0].steps, ny = tr.axes[1].steps, og = tr.grid, ogt = tr.gateGrid;
  tr.grid = Array.from({ length: nx }, (_, x) => Array.from({ length: ny }, (_, y) => (og[x] && og[x][y] != null) ? og[x][y] : (x + 2 * y) % 8));
  tr.gateGrid = Array.from({ length: nx }, (_, x) => Array.from({ length: ny }, (_, y) => (ogt[x] && ogt[x][y] != null) ? ogt[x][y] : true));
  tr.steps = nx;
  if (tr.vizEl) tr.vizCtx = fit(tr.vizEl, VIZ_W, gridH(tr));
}
function buildPlacement(tr) {
  rebuildPlacement(tr);
  tr.gates = tr.gates || tr.weights.map(() => true);   // per-stage gate on/off (off = rest)
  tr.dirs = tr.dirs || tr.weights.map(() => 'both');   // per-stage ramp direction (Ramp Map): both | up | down
  if (tr.on === undefined) tr.on = true;               // track on/off (off = runs but muted)
  if (tr.solo === undefined) tr.solo = false;          // solo: when any track is soloed, only soloed tracks sound
  tr.order = tr.order || 'fwd';                         // fwd | rev | ping
  if (tr.rateMul === undefined) tr.rateMul = 1;
  tr.acc = tr.acc || { step: 0, every: 1, limit: 0 };  // running scale-degree transpose
  if (tr.acc.advanceAt === undefined) tr.acc.advanceAt = 'stage';  // stage | pulse (pulse only bites on depth-2)
  if (tr.acc.order === undefined) tr.acc.order = 'wrap';           // wrap | pendulum (behaviour at the limit)
  tr.accVal = 0; tr.accCount = 0; tr.accDir = 1; tr.dir = 1;
  if (tr.first === undefined) tr.first = 0;             // window first stage
  if (tr.last === undefined) tr.last = tr.steps - 1;    // window last stage; window = [first, last]
  if (tr.reset === undefined) tr.reset = 1;             // measure-reset default: re-sync the cursor to the downbeat every 1 bar
  tr.barStart = 0;
  if (tr.slide === undefined) tr.slide = false;         // readout portamento
  tr.prevFreq = 0;
  tr.vmod = tr.vmod || { on: false, cut: 0, amp: 0, target: null };   // note value → cutoff/amp (bipolar); target voice (null = self)
  if (tr.vmod.target === undefined) tr.vmod.target = null;
  tr.vout = null;                                                      // published mod output (voiceFor falls back to base until set)
  tr.mover = tr.mover || 'stepped';                      // stepped | continuous (free-rate ramp)
  tr.depth = tr.depth || 1;                              // 1 = flat stage · 2 = stage→child nesting
  if (tr.depth === 2) {
    if (tr.childMode === 'curve') { tr.density = tr.density || tr.weights.map(() => 4); tr.curv = tr.curv || tr.weights.map(() => 0); }
    else { tr.pulses = tr.pulses || tr.weights.map(() => 1); tr.pgate = tr.pgate || tr.weights.map(() => 'multi'); }
  }
  if (tr.widthMode === 'abs') { if (!tr.pos) tr.pos = tr.cumStart.slice(); rebuildAbs(tr); }
  if (tr.k === 2) {                                       // two independently-clocked axes + a 2-D value grid
    tr.axes = (tr.axisDefs || [{ steps: 4 }, { steps: 3 }]).map(buildAxis);
    const nx = tr.axes[0].steps, ny = tr.axes[1].steps;
    for (const ax of tr.axes) { ax.rateMul = ax.baseRate; ax.order = tr.order; }
    tr.steps = nx;                                        // k=1 paths (accumulator, controls) read a single length
    if (!tr.grid) tr.grid = Array.from({ length: nx }, (_, x) => Array.from({ length: ny }, (_, y) => (x + 2 * y) % 8));
    if (!tr.gateGrid) tr.gateGrid = Array.from({ length: nx }, () => Array.from({ length: ny }, () => true));  // per-cell mute
    tr.gateSource = tr.gateSource || 'cell';              // x | y | cell (cell-change)
  }
}

/* ============================================================
   Engines: each is one crosser config. Even Grid = uniform 16,
   one gate each. Weighted Hold = free placement, value held.
   ============================================================ */
// Each engine — and the Custom slot — is one config of the same primitive. A preset is a
// factory returning a fresh config, so reloading a slot never shares arrays with the slot it
// replaced. Custom leaves k/mover/depth/child unlocked (the presets each pin them); U13's panel edits them.
const PRESETS = {
  evengrid: () => ({ id: 'evengrid', name: 'Even Grid', tag: 'x0x', col: '#2563eb',
    steps: 16, weights: Array(16).fill(1),
    values: [3, 6, 4, 8, 5, 7, 4, 6, 3, 7, 5, 8, 4, 6, 5, 7],
    transpose: 0, gate: 0.25, rateMul: 1, viz: 'evengrid' }),
  weighted: () => ({ id: 'weighted', name: 'Weighted Hold', tag: 'Metropolix · USTA', col: '#0d9488',
    steps: 16, weights: Array(16).fill(1),
    values: [3, 6, 4, 8, 5, 7, 4, 6, 3, 7, 5, 8, 4, 6, 5, 7],
    transpose: 0, gate: 0.25, rateMul: 1, viz: 'weighted' }),
  rampmap: () => ({ id: 'rampmap', name: 'Ramp Map', tag: 'DM', col: '#ea580c',
    steps: 16, weights: Array(16).fill(1),
    values: [3, 6, 4, 8, 5, 7, 4, 6, 3, 7, 5, 8, 4, 6, 5, 7],
    transpose: 0, gate: 0.25, rateMul: 1, mover: 'continuous', viz: 'rampmap', widthMode: 'abs' }),
  gridwalk: () => ({ id: 'gridwalk', name: 'Grid Walk', tag: 'René', col: '#16a34a',
    k: 2, axisDefs: [{ steps: 4, rateMul: 1 }, { steps: 3, rateMul: 1 / 3 }],   // X clocks, Y ÷3 (independent)
    steps: 4, weights: Array(4).fill(1), values: Array(4).fill(0),
    transpose: 0, gate: 0.25, rateMul: 1, reset: 0, viz: 'gridwalk' }),
  vectorscan: () => ({ id: 'vectorscan', name: 'Vector Scan', tag: '2D DM', col: '#ca8a04',
    k: 2, axisDefs: [{ steps: 4, rateMul: 1, mover: 'continuous' }, { steps: 3, rateMul: 1.5, mover: 'continuous' }],
    steps: 4, weights: Array(4).fill(1), values: Array(4).fill(0),
    transpose: 0, gate: 0.25, rateMul: 1, reset: 0, viz: 'vectorscan' }),
  pulsegrid: () => ({ id: 'pulsegrid', name: 'Pulse Grid', tag: 'Metropolix · ER-101', col: '#7c3aed',
    steps: 5, weights: Array(5).fill(1), values: [3, 6, 4, 8, 5], depth: 2,
    pulses: [2, 4, 1, 3, 2], pgate: ['multi', 'single', 'hold', 'multi', 'rest'],
    transpose: 0, gate: 0.5, rateMul: 0.25, reset: 0, viz: 'pulsegrid' }),   // stage = a beat so pulses are musical
  curvecloud: () => ({ id: 'curvecloud', name: 'Curve Cloud', tag: 'Flux', col: '#db2777',
    steps: 4, weights: Array(4).fill(1), values: [3, 6, 4, 8], depth: 2, childMode: 'curve',
    density: [6, 12, 4, 9], curv: [2, 6, -4, 0],
    transpose: 0, gate: 0.5, rateMul: 0.25, reset: 0, viz: 'curvecloud' }),   // stage = a beat so density stays discrete
  custom: () => ({ id: 'custom', name: 'Custom', tag: 'free', col: '#475569', custom: true,
    k: 1, mover: 'stepped', depth: 1,
    steps: 8, weights: Array(8).fill(1), values: [0, 2, 4, 5, 7, 9, 11, 12],
    transpose: 0, gate: 0.25, rateMul: 1, viz: 'weighted' }),
};
const PRESET_ORDER = ['evengrid', 'weighted', 'rampmap', 'gridwalk', 'vectorscan', 'pulsegrid', 'curvecloud', 'custom'];
const PRESET_NAMES = {}; PRESET_ORDER.forEach(id => PRESET_NAMES[id] = PRESETS[id]().name);
const tracks = PRESET_ORDER.map(id => { const tr = PRESETS[id](); tr.presetId = id; return tr; });
tracks.forEach(buildPlacement);
// Blank slate: load silent — track muted, every gate off (pitches kept; enable to build up).
function loadSilent(tr) {
  tr.on = false;
  if (tr.gates) tr.gates = tr.gates.map(() => false);
  if (tr.gateGrid) tr.gateGrid = tr.gateGrid.map(c => c.map(() => false));
  if (tr.pgate) tr.pgate = tr.pgate.map(() => 'rest');
}
tracks.forEach(loadSilent);

/* ============================================================
   Audio: native nodes, gate-driven AR/ASR voice (re-rigged from
   finished/node-e triangle->LPF->amp). Base timbre fixed.
   ============================================================ */
let ctx = null, master = null, analyser = null;
const TIMBRE = { cutoff: 2200, q: 1.0, peak: 0.26, attack: 0.006, release: 0.045 };
const SLIDE_TIME = 0.06;   // portamento glide duration
function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  if (tr.k === 2) for (const ax of tr.axes) { ax.nextTime = t0; ax.idx = ax.first; ax.dir = 1; ax.stage = (ax.widthMode === 'abs' && ax.seq) ? ax.seq[ax.idx] : ax.idx; }
}
// Change one structural dimension of the Custom slot, re-derive its renderer, rebuild it in place.
function morphCustom(tr, field, val) {
  if (field === 'k') {
    tr.k = val;
    if (val === 2) tr.axisDefs = [{ steps: 4, rateMul: 1, mover: tr.mover }, { steps: 3, rateMul: tr.mover === 'continuous' ? 1.5 : 1 / 3, mover: tr.mover }];
    else { delete tr.axes; delete tr.grid; delete tr.gateGrid; tr.steps = tr.weights.length; }
  } else if (field === 'mover') {
    tr.mover = val;
    if (tr.k === 2 && tr.axisDefs) tr.axisDefs.forEach(a => a.mover = val);
    else tr.widthMode = val === 'continuous' ? 'abs' : 'len';
  } else if (field === 'depth') { tr.depth = val; if (val === 2 && !tr.childMode) tr.childMode = 'pulse'; }
  else if (field === 'child') tr.childMode = val;
  tr.viz = customViz(tr);
  const i = tracks.indexOf(tr);
  buildPlacement(tr); spliceLive(tr);
  tr.el.replaceWith(buildTrack(tr, i));
}
// Reload slot i from a preset: fresh config, placement built, loaded silent, DOM swapped in place.
function reloadTrack(i, id) {
  const tr = PRESETS[id](); tr.presetId = id;
  buildPlacement(tr); loadSilent(tr); spliceLive(tr);
  const old = tracks[i]; tracks[i] = tr;
  old.el.replaceWith(buildTrack(tr, i));
}
function build() {
  const host = document.getElementById('tracks');
  tracks.forEach((tr, i) => host.appendChild(buildTrack(tr, i)));
  window.addEventListener('mouseup', () => { painting = null; _wdrag = null; rampDrag = null; pgDrag = null; ccDrag = null; });
  window.addEventListener('mousemove', scrubMove);
  window.addEventListener('mouseup', scrubEnd);
  const ms = document.getElementById('masterScale');
  ms.innerHTML = SCALE_NAMES.map((nm, si) =>
    '<option value="' + si + '"' + (si === masterScaleIdx ? ' selected' : '') + '>' + nm + '</option>').join('');
  ms.addEventListener('change', e => {
    masterScaleIdx = +e.target.value;
    tracks.forEach(t => { t.scaleInhEl.textContent = SCALE_NAMES[masterScaleIdx]; });
  });
  makeScrub(document.getElementById('bpm'), { get: () => BPM, set: v => BPM = v, min: 20, max: 300, step: 1, px: 2, fmt: v => '' + v });
  clockCtx = fit(document.getElementById('clockviz'), document.getElementById('clockwrap').clientWidth, 14);
}
function frame() {
  if (clockCtx) drawClock(clockCtx);
  document.getElementById('cycle').textContent = masterCycle();
  for (const tr of tracks) {
    VIZ[tr.viz](tr.vizCtx, tr, currentStep(tr));
    drawAccum(tr.accCtx, tr);
    tr.mathCtx.clearRect(0, 0, tr.mathCtx.W, tr.mathCtx.H);   // live dots move -> clear each frame
    MATH[tr.viz](tr.mathCtx, tr);
    tr.accoffEl.textContent = tdeg(tr.accVal || 0);
  }
  requestAnimationFrame(frame);
}
document.getElementById('play').addEventListener('click', () => { playing ? stop() : start(); });
build();
frame();

// Verification handle (window.* per instr2html — top-level const isn't on window).
window.SEQUOA = {
  get ctx() { return ctx; }, get analyser() { return analyser; }, get playing() { return playing; },
  tracks, currentStep, currentCell, start, stop, readout, degToFreq, SCALES, cycleDur, stageDur,
  buildPlacement, cellValue, reloadTrack, masterCycle, morphCustom, customViz, PRESET_ORDER, _tap: null,
  get masterScale() { return masterScaleIdx; },
};
</script>
